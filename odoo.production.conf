[options]
; ================================================================
; Odoo 19 — Production Configuration
; Server:  4 vCPU / 8 GB RAM  |  Ubuntu  |  Nginx reverse proxy
; Deploy:  /opt/odoo
; Copy to: /etc/odoo/odoo.conf on the server
; ================================================================


; ── Security ────────────────────────────────────────────────────
; Generate a strong hash with:
;   python3 -c "from odoo.tools.misc import hmac; import secrets; print(secrets.token_hex(32))"
; Or just use a long random string — this protects the /web/database/* manager.
admin_passwd = CHANGE_ME_USE_A_LONG_RANDOM_STRING

; Never expose the database list to the public
list_db = False

; Tell Odoo it sits behind a trusted reverse proxy (sets correct IP, proto, host)
proxy_mode = True

; Restrict to only the production database (regex)
; Replace 'odoo_prod' with your actual database name
dbfilter = ^odoo_prod$


; ── Addons paths ────────────────────────────────────────────────
; Core Odoo addons, then your custom addons folder
addons_path = /opt/odoo/odoo-19/addons,/opt/odoo/custom_addons


; ── Database ────────────────────────────────────────────────────
db_host = 127.0.0.1
db_port = 5432
db_user = odoo
db_password = CHANGE_ME_DB_PASSWORD
db_name = odoo_prod
db_template = template0
db_maxconn = 64
db_sslmode = prefer


; ── Network ─────────────────────────────────────────────────────
; Listen on loopback only — Nginx is the public-facing entry point
http_enable = True
http_interface = 127.0.0.1
http_port = 8069

; Websocket / longpolling port (Nginx proxies /websocket here)
gevent_port = 8072


; ── Workers ─────────────────────────────────────────────────────
; Formula: 2 × CPU_cores + 1
; 4 vCPUs → 9 workers.  Set to 0 to disable multi-processing (single-threaded).
workers = 9
max_cron_threads = 2


; ── Memory limits ───────────────────────────────────────────────
; Soft (640 MB): worker is gracefully recycled when it exceeds this
; Hard (768 MB): worker is forcibly killed if it exceeds this
; 9 workers × 768 MB = ~6.8 GB peak — safe for 8 GB RAM
limit_memory_soft = 671088640
limit_memory_hard = 805306368
limit_memory_soft_gevent = False
limit_memory_hard_gevent = False


; ── Request / time limits ───────────────────────────────────────
limit_request = 65536
limit_time_cpu = 60
limit_time_real = 120
; -1 = no wall-clock limit for cron jobs
limit_time_real_cron = -1


; ── Logging ─────────────────────────────────────────────────────
; 'warn' keeps the log lean; switch to 'info' temporarily to debug issues
log_level = warn
log_handler = :WARNING
logfile = /var/log/odoo/odoo.log
log_db = False
syslog = False


; ── Data directory ──────────────────────────────────────────────
; Stores filestore, sessions, etc.
; On Ubuntu: sudo mkdir -p /var/lib/odoo && sudo chown odoo:odoo /var/lib/odoo
data_dir = /var/lib/odoo


; ── Misc ────────────────────────────────────────────────────────
server_wide_modules = base,web
with_demo = False
unaccent = False
without_demo = All


; ── SMTP (configure if sending email) ───────────────────────────
; smtp_server = smtp.yourprovider.com
; smtp_port = 587
; smtp_ssl = True
; smtp_user = noreply@yourdomain.com
; smtp_password = CHANGE_ME_SMTP_PASSWORD
; email_from = noreply@yourdomain.com
