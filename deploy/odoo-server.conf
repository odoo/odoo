[options]
; ============================================================
; Odoo 18 Production/VPS Configuration
; ============================================================

; --- Database ---
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
; db_name = odoo18prod
; db_filter = odoo18prod

; --- Paths ---
addons_path = /opt/odoo/addons,/mnt/extra-addons,/opt/odoo/odoo/addons

; --- Server ---
http_port = 8069
longpolling_port = 8072
proxy_mode = True
xmlrpc_interface = 0.0.0.0

; --- Logging ---
log_level = warn
log_file = /var/log/odoo/odoo-server.log
logrotate = True

; --- Security ---
; IMPORTANT: Change this to a strong password before deploying!
admin_passwd = CHANGE_ME_TO_A_STRONG_PASSWORD
list_db = False

; --- Performance ---
workers = 4
max_cron_threads = 2
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

; --- Data ---
data_dir = /var/lib/odoo

; --- Default Apps ---
default_productivity_apps = True
