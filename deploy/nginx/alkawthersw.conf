# nginx config for alkawthersw.ddns.net -> Odoo
server {
    listen 80;
    server_name alkawthersw.ddns.net;

    # Redirect all HTTP to HTTPS for the domain
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name alkawthersw.ddns.net;

    # SSL certificate (to be provided by certbot/Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/alkawthersw.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alkawthersw.ddns.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/alkawthersw.access.log;
    error_log /var/log/nginx/alkawthersw.error.log;

    proxy_buffering off;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8069;
    }

    # Odoo longpolling (if used)
    location /longpolling {
        proxy_pass http://127.0.0.1:8072;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
