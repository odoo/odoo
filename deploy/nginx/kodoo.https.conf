# Resolver is the Docker internal DNS (127.0.0.11)
# Using variables in proxy_pass prevents Nginx from failing at startup if Odoo is down.
resolver 127.0.0.11 valid=30s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $host $tenant_db {
    default "";
    localhost "__LOCAL_DEFAULT_DB__";
    127.0.0.1 "__LOCAL_DEFAULT_DB__";
    __DOMAIN__ "";
    www.__DOMAIN__ "";
    __ROOT_DB__.__DOMAIN__ "";
    ~^(?<tenant>[^.]+)\.__DOMAIN__$ $tenant;
}

map $host $odoo_forwarded_host {
    default $host;
    localhost "__LOCAL_DEFAULT_DB__.__DOMAIN__";
    127.0.0.1 "__LOCAL_DEFAULT_DB__.__DOMAIN__";
}

server {
    listen 80;
    server_name __DOMAIN__ www.__DOMAIN__ __WILDCARD_DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        if ($host = __ROOT_DB__.__DOMAIN__) {
            return 301 https://__DOMAIN__$request_uri;
        }
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name __DOMAIN__ www.__DOMAIN__ __WILDCARD_DOMAIN__;

    set $odoo_app_url "http://odoo:8069";
    set $odoo_bus_url "http://odoo:8072";

    ssl_certificate /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:20m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 100m;
    proxy_read_timeout 720s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 720s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    if ($host = __ROOT_DB__.__DOMAIN__) {
        return 301 https://__DOMAIN__$request_uri;
    }

    location = / {
        if ($tenant_db != "") {
            return 302 /web/login?db=$tenant_db;
        }

        proxy_pass $odoo_app_url;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location = /odoo {
        proxy_pass $odoo_app_url;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location /longpolling {
        proxy_pass $odoo_bus_url;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_buffering off;
    }

    location /websocket {
        proxy_pass $odoo_bus_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location / {
        proxy_pass $odoo_app_url;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}
