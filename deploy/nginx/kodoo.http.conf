# Resolver is the Docker internal DNS (127.0.0.11)
# Using variables in proxy_pass prevents Nginx from failing at startup if Odoo is down.
resolver 127.0.0.11 valid=30s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_x_forwarded_proto $upstream_forwarded_proto {
    default "";
    "~*https" https;
    "~*http" http;
}

map $http_cf_visitor $cf_visitor_proto {
    default "";
    "~*\"scheme\":\"https\"" https;
    "~*\"scheme\":\"http\"" http;
}

map "$upstream_forwarded_proto:$cf_visitor_proto" $proxy_x_forwarded_proto {
    default $scheme;
    "~^https:" https;
    "~^http:" http;
    "~^:https$" https;
    "~^:http$" http;
}

map $proxy_x_forwarded_proto $proxy_x_forwarded_port {
    default 80;
    https 443;
}

map $host $tenant_db {
    default "";
    localhost "__LOCAL_DEFAULT_DB__";
    127.0.0.1 "__LOCAL_DEFAULT_DB__";
    __DOMAIN__ "";
    www.__DOMAIN__ "";
    __ROOT_DB__.__DOMAIN__ "";
    ~^(?<tenant>[^.]+)\.__DOMAIN__$ $tenant;
}

map $host $odoo_forwarded_host {
    default $host;
    localhost "__LOCAL_DEFAULT_DB__.__DOMAIN__";
    127.0.0.1 "__LOCAL_DEFAULT_DB__.__DOMAIN__";
}

server {
    listen 80;
    server_name __DOMAIN__ www.__DOMAIN__ __WILDCARD_DOMAIN__;

    set $odoo_app_url "http://odoo:8069";
    set $odoo_bus_url "http://odoo:8072";

    if ($host = www.__DOMAIN__) {
        return 301 https://__DOMAIN__$request_uri;
    }

    if ($host = __ROOT_DB__.__DOMAIN__) {
        return 301 https://__DOMAIN__$request_uri;
    }

    client_max_body_size 100m;
    proxy_read_timeout 900s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 900s;
    proxy_buffers 16 64k;
    proxy_buffer_size 128k;
    proxy_busy_buffers_size 256k;
    proxy_temp_file_write_size 256k;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = / {
        if ($tenant_db != "") {
            return 302 $proxy_x_forwarded_proto://$host/web/login?db=$tenant_db;
        }

        proxy_pass $odoo_app_url;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Port $proxy_x_forwarded_port;
        proxy_redirect off;
    }

    location = /odoo {
        proxy_pass $odoo_app_url;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Port $proxy_x_forwarded_port;
        proxy_redirect off;
    }

    location /longpolling {
        proxy_pass $odoo_bus_url;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Port $proxy_x_forwarded_port;
        proxy_redirect off;
        proxy_buffering off;
    }

    location /websocket {
        proxy_pass $odoo_bus_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Port $proxy_x_forwarded_port;
        proxy_redirect off;
    }

    location / {
        proxy_pass $odoo_app_url;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-Host $odoo_forwarded_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Port $proxy_x_forwarded_port;
        proxy_redirect off;
    }
}
