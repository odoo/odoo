upstream odoo_http { server odoo:8069; }
upstream odoo_ws   { server odoo:8072; }

server {
    listen 80;
    server_name odooclub26.rkposinc.com;

    client_max_body_size 100m;

    # Tell Odoo the original connection was HTTPS (Cloudflare handles the TLS)
    proxy_set_header X-Forwarded-Proto https;

    # ── WebSocket / longpolling (POS live updates, kitchen display) ──────────
    location /websocket {
        proxy_pass         http://odoo_ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # ── All other requests → Odoo ─────────────────────────────────────────────
    location / {
        proxy_pass              http://odoo_http;
        proxy_redirect          off;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout   720s;
        proxy_send_timeout      720s;
        proxy_read_timeout      720s;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }
}
