[options]
; -------------------------------------------------------------------
; Default Odoo configuration baked into the Railway image.
;
; The entrypoint passes connection details on the CLI (derived from
; $DATABASE_URL), which take precedence over anything set here. Only
; tune values that are stable across environments below; secrets and
; per-environment overrides belong in Railway service variables.
; -------------------------------------------------------------------

addons_path = /opt/odoo/addons,/mnt/extra-addons
data_dir = /var/lib/odoo

; Workers: 0 means single-process (threaded) mode, which is the safest
; default for small Railway plans. Bump via ODOO_WORKERS / a config
; override once you've sized the service.
workers = 0

; Disable the database manager UI by default. Set proxy_mode = True so
; Odoo trusts the X-Forwarded-* headers from Railway's edge proxy.
list_db = False
proxy_mode = True

; Logging: stdout so Railway captures it.
logfile = False
log_level = info

; Email-out via Railway-provided SMTP env vars if present; commented
; placeholders left for visibility.
;smtp_server =
;smtp_port = 587
;smtp_ssl = True
;smtp_user =
;smtp_password =
