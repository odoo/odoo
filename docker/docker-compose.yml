name: rkpos

# ── How to use ────────────────────────────────────────────────────────────────
# 1. Copy .env.example → .env  (or leave defaults — values are already set)
# 2. docker compose pull
# 3. docker compose up -d
#
# Cloudflare Tunnel handles SSL and external routing (tunnel → localhost:80).
# LAN devices access via server IP directly (192.168.x.x:80 / :8069 / :8072).
# PostgreSQL stays loopback-only (SSH tunnel for DB tools).
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER:     ${DB_USER:-odoo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-odoo}
      POSTGRES_DB:       ${DB_NAME:-odoo-db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # reachable by DB tools via SSH tunnel
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Odoo 19 (image pulled from Docker Hub) ────────────────────────────────
  odoo:
    image: rkpos/rkpos-odoo:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST:              postgres
      DB_PORT:              "5432"
      DB_USER:              ${DB_USER:-odoo}
      DB_PASSWORD:          ${DB_PASSWORD:-odoo}
      DB_NAME:              ${DB_NAME:-odoo-db}
      ODOO_MASTER_PASSWORD: ${ODOO_MASTER_PASSWORD:-rkpassword}
      ODOO_WORKERS:         ${ODOO_WORKERS:-9}
    volumes:
      - odoo_data:/var/lib/odoo
      - odoo_logs:/var/log/odoo
    networks:
      - backend
      - frontend
    ports:
      - "8069:8069"   # Odoo HTTP  — LAN + SSH tunnel
      - "8072:8072"   # Odoo WS/longpolling — LAN + SSH tunnel
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8069/web/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Portainer CE ──────────────────────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    restart: always
    command: --http-enabled   # enables port 9000 so nginx can proxy without TLS internally
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "9443:9443"   # direct HTTPS access — LAN + SSH tunnel
    networks:
      - frontend
    healthcheck:
      disable: true

  # ── Nginx (HTTP only — SSL handled by Cloudflare Tunnel) ──────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"             # LAN + Cloudflare Tunnel
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      odoo:
        condition: service_healthy
      portainer:
        condition: service_started
    networks:
      - frontend

# ── Persistent volumes ────────────────────────────────────────────────────────
volumes:
  postgres_data:
  odoo_data:
  odoo_logs:
  portainer_data:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  backend:          # postgres ↔ odoo only
    driver: bridge
  frontend:         # nginx ↔ odoo ↔ portainer
    driver: bridge
