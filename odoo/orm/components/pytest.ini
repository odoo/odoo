[pytest]
# Force importlib import mode for standalone component tests.
#
# Without this, pytest's default import mode walks up the filesystem,
# importing each __init__.py — which triggers orm/__init__.py →
# import odoo.init and pulls in the entire Odoo framework
# (monkeypatches, werkzeug, HTTP stack, circular imports).
#
# importlib mode imports each test file as an independent module,
# bypassing the parent __init__.py chain entirely.
#
# IMPORTANT: import_mode must be in addopts (CLI arg) not as a config
# setting, because conftest.py loading happens before ini config
# options are fully applied to the import mechanism.
addopts = --import-mode=importlib
testpaths = tests
