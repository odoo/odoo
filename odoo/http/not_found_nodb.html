<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Not Found</title>
        <!-- Design similar to /odoo/offline page -->
        <style>
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Ubuntu, "Noto Sans", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
                padding: 0;
                margin: 0;
                background-color: #fff;
                color: rgb(17, 24, 39);
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                height: 100vh;
                width: 100vw;
                user-select: none;
            }
            .card {
                width: 80%
            }
            .card img {
                width: 96px;
                height: auto;
                filter: grayscale(.6);
            }
            a {
                color: #714B67;
            }
        </style>
    </head>
    <body>
        <div class=card>
            <img alt="Odoo logo" src=/web/static/img/odoo-icon.svg width=192>
            <h1>Not Found</h1>
            <p>No database is selected and the requested URL is not server-wide.</p>
            <p>Please verify the hostname, <a href=/web/login>login</a> and try again.</p>
        </div>
        <!-- Alternatively, use the X-Odoo-Database header. -->
    </body>
</html>
