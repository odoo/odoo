name: Sync Fork with Upstream

on:
  schedule:
     - cron: '0 3 * * 2,4,6'  # Runs at 10:00 AM UTC+7 on Tuesday, Thursday, and Saturday
  workflow_dispatch:  # Allows manual triggering

jobs:
  sync-fork:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ensures full history is available

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream and Fetch Changes
        run: |
          git remote add upstream https://github.com/odoo/odoo.git || true
          git fetch upstream 18.0

      - name: Checkout 18.0 branch
        run: git checkout 18.0

      - name: Pull latest changes from origin
        run: |
          git pull --rebase origin 18.0 || echo "No new changes to rebase"

      - name: Merge Upstream Changes
        run: |
          git merge upstream/18.0 --no-edit || echo "No changes to merge"

      - name: Push Changes to Fork
        run: |
          git push origin 18.0 || echo "No new changes to push"
