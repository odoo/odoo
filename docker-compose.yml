version: '3.8'
 
services:
  db:
    image: postgres:15
    container_name: odoo_db
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo_password
      - POSTGRES_DB=postgres
    volumes:
      - odoo_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
 
  web:
    image: odoo:19.0
    container_name: odoo_web
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - ./config:/etc/odoo
      - ./odoo_filestore:/var/lib/odoo
      - ./enterprise:/mnt/enterprise
      - ./custom-addons:/mnt/extra-addons
     
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo_password
    # --init=base: inicializa o banco automaticamente no primeiro boot com demo data (configurado no odoo.conf)
    # Após o banco criado, o --init é ignorado nas próximas execuções (Odoo detecta que o banco já existe)
    command: odoo -c /etc/odoo/odoo.conf --init=base
 
volumes:
  odoo_pgdata:
  odoo_filestore: