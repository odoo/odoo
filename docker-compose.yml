# Kodoo.online — Production Docker Compose
# Arch Linux (WSL) | Odoo 19 | PostgreSQL 16 | Ollama
#
# Usage:
#   docker compose up -d
#   docker compose logs -f odoo

services:
  db:
    image: postgres:16
    container_name: kodoo-db
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=${DB_REPLICA_MAX_WAL_SENDERS:-10}
      - -c
      - max_replication_slots=${DB_REPLICA_MAX_SLOTS:-10}
      - -c
      - hot_standby=on
      - -c
      - hba_file=/etc/postgresql/pg_hba.replication.conf
    environment:
      - POSTGRES_DB=${PROD_DB_NAME}
      - POSTGRES_USER=${PROD_DB_USER}
      - POSTGRES_PASSWORD=${PROD_DB_PASSWORD}
      # Allows Odoo to create additional databases per tenant
      - POSTGRES_HOST_AUTH_METHOD=md5
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
      - ./docker/postgres/primary/pg_hba.replication.conf:/etc/postgresql/pg_hba.replication.conf:ro
    networks:
      - kodoo-net
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PROD_DB_USER} -d ${PROD_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  db-replica-setup:
    image: postgres:16
    container_name: kodoo-db-replica-setup
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=${PROD_DB_USER}
      - PGPASSWORD=${PROD_DB_PASSWORD}
      - REPLICATION_USER=${DB_REPLICA_USER:-replicator}
      - REPLICATION_PASSWORD=${DB_REPLICA_PASSWORD:-}
      - FALLBACK_REPLICATION_PASSWORD=${PROD_DB_PASSWORD}
      - REPLICATION_SLOT=${DB_REPLICA_SLOT:-kodoo_replica}
    command:
      - /bin/bash
      - /opt/kodoo/db-replica-setup.sh
    volumes:
      - ./docker/postgres/scripts/db-replica-setup.sh:/opt/kodoo/db-replica-setup.sh:ro
    networks:
      - kodoo-net
    restart: "no"

  db-replica:
    image: postgres:16
    container_name: kodoo-db-replica
    depends_on:
      db:
        condition: service_healthy
      db-replica-setup:
        condition: service_completed_successfully
    environment:
      - PGDATA=/var/lib/postgresql/data
      - PRIMARY_HOST=db
      - PRIMARY_PORT=5432
      - REPLICATION_USER=${DB_REPLICA_USER:-replicator}
      - REPLICATION_PASSWORD=${DB_REPLICA_PASSWORD:-}
      - FALLBACK_REPLICATION_PASSWORD=${PROD_DB_PASSWORD}
      - REPLICATION_SLOT=${DB_REPLICA_SLOT:-kodoo_replica}
    command:
      - /bin/bash
      - /opt/kodoo/db-replica-bootstrap.sh
    volumes:
      - odoo-db-replica-data:/var/lib/postgresql/data
      - ./docker/postgres/scripts/db-replica-bootstrap.sh:/opt/kodoo/db-replica-bootstrap.sh:ro
    networks:
      - kodoo-net
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PROD_DB_USER} -d postgres && psql -U ${PROD_DB_USER} -d postgres -tAc \"SELECT pg_is_in_recovery()\" | grep -q t",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  odoo:
    build:
      context: .
      dockerfile: docker/odoo/Dockerfile.public-sector
      args:
        PUBLIC_SECTOR_EXTRA_APT_PACKAGES: ${PUBLIC_SECTOR_EXTRA_APT_PACKAGES:-}
        PUBLIC_SECTOR_EXTRA_PIP_PACKAGES: ${PUBLIC_SECTOR_EXTRA_PIP_PACKAGES:-}
        PUBLIC_SECTOR_INSTALL_AI_EXTRAS: ${PUBLIC_SECTOR_INSTALL_AI_EXTRAS:-1}
        LEGACY_GOV_EXTRA_APT_PACKAGES: ${AGI_GOV_EXTRA_APT_PACKAGES:-}
        LEGACY_GOV_EXTRA_PIP_PACKAGES: ${AGI_GOV_EXTRA_PIP_PACKAGES:-}
        LEGACY_GOV_INSTALL_AI_EXTRAS: ${AGI_GOV_INSTALL_AI_EXTRAS:-1}
    image: kodoo-odoo:19.0-public-sector
    container_name: kodoo-odoo
    command:
      - odoo
      - -c
      - /etc/odoo/odoo.conf
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8069"
      - "8072"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./custom_addons:/mnt/custom-addons
      - ./deploy/odoo/kodoo.prod.local.conf:/etc/odoo/odoo.conf:ro
    environment:
      - HOST=db
      - USER=${PROD_DB_USER}
      - PASSWORD=${PROD_DB_PASSWORD}
      - OLLAMA_HOST=http://ollama:11434
      - KODOO_RUNTIME_PROFILE=public-sector
    networks:
      - kodoo-net
    restart: always

  nginx:
    image: nginx:1.27-alpine
    container_name: kodoo-nginx
    depends_on:
      - odoo
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/start-nginx.sh:/etc/nginx/start-nginx.sh:ro
      - ./deploy/nginx/kodoo.http.conf:/etc/nginx/templates/kodoo.http.conf:ro
      - ./deploy/nginx/kodoo.https.conf:/etc/nginx/templates/kodoo.https.conf:ro
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN}
      - PROD_DB_NAME=${PROD_DB_NAME}
      - LOCAL_DEFAULT_DB=${LOCAL_DEFAULT_DB:-}
    command: ["/bin/sh", "/etc/nginx/start-nginx.sh"]
    networks:
      - kodoo-net
    restart: always

  certbot:
    image: certbot/certbot:latest
    container_name: kodoo-certbot
    profiles:
      - certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks:
      - kodoo-net

  ollama:
    image: ollama/ollama:latest
    container_name: kodoo-ollama
    environment:
      # Default to CPU mode to avoid GPU/CUDA runtime requirements on non-GPU hosts.
      - OLLAMA_LLM_LIBRARY=cpu
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - kodoo-net
    # GPU NVIDIA (descomente se disponível):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: always

volumes:
  odoo-db-data:
  odoo-db-replica-data:
  odoo-web-data:
  ollama-data:
  letsencrypt:
  certbot-www:


networks:
  kodoo-net:
    driver: bridge
