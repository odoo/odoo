# Kodoo.online — Production Docker Compose
# Arch Linux (WSL) | Odoo 19 | PostgreSQL 16 | Ollama
#
# Usage:
#   docker compose up -d
#   docker compose logs -f odoo

services:
  db:
    image: postgres:16
    container_name: kodoo-db
    environment:
      - POSTGRES_DB=${PROD_DB_NAME}
      - POSTGRES_USER=${PROD_DB_USER}
      - POSTGRES_PASSWORD=${PROD_DB_PASSWORD}
      # Allows Odoo to create additional databases per tenant
      - POSTGRES_HOST_AUTH_METHOD=md5
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    networks:
      - kodoo-net
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PROD_DB_USER} -d ${PROD_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    build:
      context: .
      dockerfile: docker/odoo/Dockerfile.public-sector
      args:
        PUBLIC_SECTOR_EXTRA_APT_PACKAGES: ${PUBLIC_SECTOR_EXTRA_APT_PACKAGES:-}
        PUBLIC_SECTOR_EXTRA_PIP_PACKAGES: ${PUBLIC_SECTOR_EXTRA_PIP_PACKAGES:-}
        PUBLIC_SECTOR_INSTALL_AI_EXTRAS: ${PUBLIC_SECTOR_INSTALL_AI_EXTRAS:-}
        LEGACY_GOV_EXTRA_APT_PACKAGES: ${AGI_GOV_EXTRA_APT_PACKAGES:-}
        LEGACY_GOV_EXTRA_PIP_PACKAGES: ${AGI_GOV_EXTRA_PIP_PACKAGES:-}
        LEGACY_GOV_INSTALL_AI_EXTRAS: ${AGI_GOV_INSTALL_AI_EXTRAS:-0}
    image: kodoo-odoo:19.0-public-sector
    container_name: kodoo-odoo
    command:
      - odoo
      - -c
      - /etc/odoo/odoo.conf
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8069"
      - "8072"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./custom_addons:/mnt/custom-addons
      - ./deploy/odoo/kodoo.prod.local.conf:/etc/odoo/odoo.conf:ro
    environment:
      - HOST=db
      - USER=${PROD_DB_USER}
      - PASSWORD=${PROD_DB_PASSWORD}
      - OLLAMA_HOST=http://ollama:11434
      - KODOO_RUNTIME_PROFILE=public-sector
    networks:
      - kodoo-net
    restart: always

  nginx:
    image: nginx:1.27-alpine
    container_name: kodoo-nginx
    depends_on:
      - odoo
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/start-nginx.sh:/etc/nginx/start-nginx.sh:ro
      - ./deploy/nginx/kodoo.http.conf:/etc/nginx/templates/kodoo.http.conf:ro
      - ./deploy/nginx/kodoo.https.conf:/etc/nginx/templates/kodoo.https.conf:ro
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN}
      - PROD_DB_NAME=${PROD_DB_NAME}
    command: ["/bin/sh", "/etc/nginx/start-nginx.sh"]
    networks:
      - kodoo-net
    restart: always

  certbot:
    image: certbot/certbot:latest
    container_name: kodoo-certbot
    profiles:
      - certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks:
      - kodoo-net

  ollama:
    image: ollama/ollama:latest
    container_name: kodoo-ollama
    environment:
      # Default to CPU mode to avoid GPU/CUDA runtime requirements on non-GPU hosts.
      - OLLAMA_LLM_LIBRARY=cpu
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - kodoo-net
    # GPU NVIDIA (descomente se disponível):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: always

volumes:
  odoo-db-data:
  odoo-web-data:
  ollama-data:
  letsencrypt:
  certbot-www:


networks:
  kodoo-net:
    driver: bridge
