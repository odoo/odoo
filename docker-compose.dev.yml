version: '3.9'

services:
  odoo:
    env_file:
      - .env.dev
    depends_on:
      - db
    ports:
      - '777:8069'

  db:
    image: postgres:18
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: odoo_dev
    volumes:
      - db-data:/var/lib/postgresql
    restart: unless-stopped

volumes:
  db-data:
