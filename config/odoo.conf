[options]
; Do not commit secrets in this file for production. Use env vars / secrets.
admin_passwd = ${ODOO_ADMIN_PASSWD}

db_host = ${DB_HOST}
db_port = ${DB_PORT}
db_user = ${DB_USER}
db_password = ${DB_PASSWORD}

data_dir = /var/lib/odoo

; Odoo v19: include core addons + community addons + your custom addons
addons_path = /opt/odoo/odoo/addons,/opt/odoo/addons,/opt/odoo/custom_addons

proxy_mode = ${ODOO_PROXY_MODE}

; Logging (stdout is typically preferred in containers)
log_level = ${ODOO_LOG_LEVEL}
